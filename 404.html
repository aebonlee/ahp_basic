<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>AHP Basic</title>
    <script>
      // GitHub Pages SPA redirect
      // Converts path-based URLs to hash-based URLs for HashRouter
      (function () {
        var path = window.location.pathname;
        var hash = window.location.hash;
        var search = window.location.search;
        // If already at root or has a hash, just go to root
        if (path === '/' || path === '/index.html') {
          window.location.replace('/' + search + hash);
        } else {
          // Convert /some/path to /#/some/path
          window.location.replace('/#' + path + search);
        }
      })();
    </script>
  </head>
  <body>
  </body>
</html>
